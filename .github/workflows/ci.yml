name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poetry
        run: pip install "poetry>=2.0,<3.0"

      - name: Install dependencies
        run: poetry install

      - name: Ruff check
        run: poetry run ruff check .

      - name: Mypy
        run: poetry run mypy tiny_dec

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poetry
        run: pip install "poetry>=2.0,<3.0"

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest
