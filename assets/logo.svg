<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="dot-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="240" y="44" text-anchor="middle"
        font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Courier New',monospace"
        font-size="42" font-weight="700" fill="#18181b"
        letter-spacing="-2">tiny-dec</text>

  <!-- Gradient accent bar -->
  <rect x="140" y="52" width="200" height="3" rx="1.5" fill="url(#bar)"/>

  <!-- Subtitle -->
  <text x="240" y="74" text-anchor="middle"
        font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif"
        font-size="12" fill="#71717a" letter-spacing="2.5" font-weight="500">EDUCATIONAL DECOMPILER</text>

  <!-- Pipeline visualization -->
  <g transform="translate(136, 90)">
    <!-- ELF pill -->
    <rect x="0" y="0" width="36" height="18" rx="9" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
    <text x="18" y="12.5" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" font-weight="600" fill="#ea580c">ELF</text>

    <!-- Dots -->
    <circle cx="52" cy="9" r="2" fill="#f97316" opacity="0.9"/>
    <circle cx="64" cy="9" r="2" fill="#f59e0b" opacity="0.7"/>
    <circle cx="76" cy="9" r="2" fill="#ef4444" opacity="0.7"/>
    <circle cx="88" cy="9" r="2" fill="#ec4899" opacity="0.7"/>
    <circle cx="100" cy="9" r="2" fill="#d946ef" opacity="0.7"/>
    <circle cx="112" cy="9" r="2" fill="#a855f7" opacity="0.7"/>
    <circle cx="124" cy="9" r="2" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="136" cy="9" r="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="148" cy="9" r="2" fill="#6d28d9" opacity="0.7"/>
    <circle cx="160" cy="9" r="2" fill="#8b5cf6" opacity="0.9"/>

    <!-- Connecting line -->
    <line x1="48" y1="9" x2="164" y2="9" stroke="url(#dot-grad)" stroke-width="0.75" opacity="0.2"/>

    <!-- C pill -->
    <rect x="172" y="0" width="36" height="18" rx="9" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="190" y="12.5" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" font-weight="600" fill="#7c3aed">C</text>
  </g>
</svg>
